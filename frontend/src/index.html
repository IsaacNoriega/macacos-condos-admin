<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Macacos Condos Admin</title>
    <meta name="description" content="Plataforma multi-tenant para administración de condominios" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      // Instant theme load — prevents flash of incorrect theme
      (function() {
        var saved = localStorage.getItem('macacos-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
