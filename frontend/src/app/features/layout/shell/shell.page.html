<div class="shell" [class.sidebar-collapsed]="sidebarCollapsed()">
	<aside class="sidebar" [class.open]="menuOpen()" [class.collapsed]="sidebarCollapsed()">
		<header class="sidebar-header">
			<div class="brand-copy">
				<h1>Macacos Condos</h1>
				<p>Admin SaaS</p>
			</div>
			<button class="collapse-toggle" type="button" (click)="toggleSidebar()" [attr.aria-label]="sidebarCollapsed() ? 'Expandir sidebar' : 'Contraer sidebar'">
				<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
					<path d="M6 7l6 5-6 5" />
					<path d="M12 7l6 5-6 5" />
				</svg>
			</button>
		</header>

		<nav class="sidebar-nav">
			@for (section of availableSections(); track section.title) {
			<section class="nav-group">
				<h2>{{ section.title }}</h2>
				<div class="nav-links">
					@for (item of section.items; track item.route) {
					<a [routerLink]="item.route" routerLinkActive="active" (click)="closeMenu()">
						<span class="nav-icon" aria-hidden="true">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
								<path [attr.d]="iconPath(item.icon)" />
							</svg>
						</span>
						<span class="nav-copy">
							<span class="nav-label">{{ item.label }}</span>
							@if (item.hint) {
							<small>{{ item.hint }}</small>
							}
						</span>
					</a>
					}
				</div>
			</section>
			}
		</nav>

		<footer>
			<div class="profile-card">
				<div class="avatar" aria-hidden="true">{{ userInitials() }}</div>
				<div class="profile-copy">
					<p>{{ auth.user()?.name }}</p>
					<small>{{ auth.user()?.role }}</small>
				</div>
			</div>

			<div class="footer-actions">
				<button class="theme-toggle" type="button" (click)="toggleTheme()" [attr.aria-label]="darkMode() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
					@if (darkMode()) {
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<circle cx="12" cy="12" r="5"/>
						<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
					</svg>
					} @else {
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
					</svg>
					}
				</button>
				<button class="logout-button" type="button" (click)="logout()">
					<span aria-hidden="true">⎋</span>
					<span>Cerrar sesión</span>
				</button>
			</div>
		</footer>
	</aside>

	<main class="shell-main">
		<button class="menu-toggle" type="button" (click)="toggleMenu()">Menu</button>
		<router-outlet />
	</main>
</div>
