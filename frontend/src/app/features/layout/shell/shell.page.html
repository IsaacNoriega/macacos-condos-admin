<div class="shell">
	<aside class="sidebar" [class.open]="menuOpen()">
		<header>
			<h1>Macacos Condos</h1>
			<p>Admin SaaS</p>
		</header>

		<nav>
			@for (item of availableItems(); track item.route) {
			<a [routerLink]="item.route" routerLinkActive="active" (click)="closeMenu()">
				{{ item.label }}
			</a>
			}
		</nav>

		<footer>
			<p>{{ auth.user()?.name }}</p>
			<small>{{ auth.user()?.role }}</small>
			<button type="button" (click)="logout()">Cerrar sesion</button>
		</footer>
	</aside>

	<main>
		<button class="menu-toggle" type="button" (click)="toggleMenu()">Menu</button>
		<router-outlet />
	</main>
</div>
