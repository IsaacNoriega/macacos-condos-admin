<section class="dashboard-page">
	<header class="hero">
		<div class="hero-copy">
			<div class="hero-title-row">
				<h1>Panel de control</h1>
				<span class="title-chip" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
						<path d="M4 6h16M4 12h16M4 18h8" />
					</svg>
				</span>
			</div>

			<div class="hero-meta">
				<div class="hero-avatar" aria-hidden="true">{{ userInitials() }}</div>
				<div class="hero-user-lines">
					<p>Bienvenido, {{ auth.user()?.name }}. Rol: {{ auth.user()?.role }}.</p>
					<small>Actualizado: {{ now() | date : 'medium' }}</small>
				</div>
			</div>
		</div>
		<button class="refresh" type="button" (click)="refresh()" [disabled]="loading()">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
				<path d="M3 12a9 9 0 0 1 15.2-6.4L21 8M21 12a9 9 0 0 1-15.2 6.4L3 16" />
			</svg>
			<span>Actualizar métricas</span>
		</button>
	</header>

	@if (error()) {
	<p class="error">{{ error() }}</p>
	}

	<div class="cards">
		@for (card of cards(); track card.label) {
		<article class="card">
			<div class="card-icon" aria-hidden="true">
				<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
					<path [attr.d]="iconPath(card.icon)" />
				</svg>
			</div>
			<p class="metric">{{ card.value }}</p>
			<h2>{{ card.label }}</h2>
		</article>
		}
	</div>
</section>
