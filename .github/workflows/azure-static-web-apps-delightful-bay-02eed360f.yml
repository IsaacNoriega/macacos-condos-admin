name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # El token secreto que Azure generó para tu repo
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_BAY_02EED360F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} 
          action: "upload"
          
          ###### CONFIGURACIÓN DE RUTAS - CORREGIDO ######
          # 1. Donde está tu código de Angular
          app_location: "/frontend" 
          
          # 2. Déjalo vacío si no usas Azure Functions
          api_location: "" 
          
          # 3. Angular 21 (@angular/build:application) publica el index en browser/
          output_location: "dist/frontend/browser" 
          ###############################################

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_BAY_02EED360F }}
          action: "close"
